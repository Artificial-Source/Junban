name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish (for example v1.0.1)
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-release:
    name: Verify Release Candidate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME='${{ github.event.inputs.tag }}'
            git fetch --tags origin "$TAG_NAME"
          else
            TAG_NAME='${{ github.ref_name }}'
          fi

          if ! git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME was not found" >&2
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        run: git checkout '${{ steps.tag.outputs.tag_name }}'

      - name: Ensure tag commit is on main
        run: |
          TAG_SHA=$(git rev-list -n 1 '${{ steps.tag.outputs.tag_name }}')
          if ! git branch -r --contains "$TAG_SHA" | grep -q 'origin/main$'; then
            echo "Release tags must point to a commit that is already on origin/main" >&2
            exit 1
          fi

      - name: Verify release branding metadata
        run: |
          grep -q '"name": "asf-junban"' package.json
          grep -q '^name = "asf-junban"' src-tauri/Cargo.toml
          grep -q '^name = "asf_junban_lib"' src-tauri/Cargo.toml
          grep -q '"productName": "ASF Junban"' src-tauri/tauri.conf.json
          grep -q '"identifier": "com.asf.junban"' src-tauri/tauri.conf.json
          grep -q 'Artificial-Source-Foundation/Junban/releases/latest/download/latest.json' src-tauri/tauri.conf.json

          if grep -nE 'asf-saydo|asf_saydo_lib|ASF Saydo|com\.asf\.saydo|ASF-GROUP/Saydo' package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json; then
            echo "Stale pre-Junban branding is still present in release metadata" >&2
            exit 1
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm docs:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
  create-release:
    needs: verify-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.verify-release.outputs.tag_name }}

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.verify-release.outputs.tag_name }}"
          VERSION="${VERSION#v}"
          COMMITS=$(awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { in_section=1; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md)

          if [ -z "$COMMITS" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -z "$PREV_TAG" ]; then
              COMMITS=$(git log --pretty=format:"- %s (%h)")
            else
              COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
            fi
          fi

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create
        uses: actions/github-script@v8
        env:
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `${{ needs.verify-release.outputs.tag_name }}`,
              name: `ASF Junban ${{ needs.verify-release.outputs.tag_name }}`,
              body: process.env.RELEASE_BODY,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: [verify-release, create-release]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-release.outputs.tag_name }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: corepack enable

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS notarization (configure when Apple Developer account is available)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  verify-release-assets:
    name: Verify Draft Release Assets
    needs: [verify-release, create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate uploaded assets and updater metadata
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
            });

            const assetNames = data.assets.map((asset) => asset.name);

            core.info(`Draft release assets: ${assetNames.join(", ")}`);

            const staleAsset = assetNames.find((name) => /saydo|docket/i.test(name));
            if (staleAsset) {
              core.setFailed(`Draft release still contains stale branding: ${staleAsset}`);
              return;
            }

            if (!assetNames.some((name) => name === "latest.json")) {
              core.setFailed("Draft release is missing latest.json updater metadata");
              return;
            }

            const platformAssetPatterns = [/\.deb$/i, /\.AppImage$/i, /\.dmg$/i, /\.msi$/i, /-setup\.exe$/i];
            const hasPlatformInstaller = assetNames.some((name) => platformAssetPatterns.some((pattern) => pattern.test(name)));
            if (!hasPlatformInstaller) {
              core.setFailed("Draft release is missing platform installer assets");
            }

  publish:
    needs: [verify-release, create-release, build, verify-release-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
