name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [developer, main]
  pull_request:
    branches: [developer, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck, Test & Packaging Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - run: corepack enable
      - run: corepack prepare pnpm@10.29.1 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm docs:check
      - run: pnpm typecheck
      - run: pnpm test
      - name: Install system dependencies for Rust desktop tests
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: cargo test --manifest-path src-tauri/Cargo.toml --lib
      - run: pnpm build
      - run: pnpm tauri:prepare-sidecar
      - run: pnpm tauri:validate-sidecar
