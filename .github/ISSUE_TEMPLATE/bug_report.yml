name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: Paste any relevant error messages or logs.
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: dropdown
    id: interface
    attributes:
      label: Interface
      description: Which interface were you using?
      options:
        - Desktop (Tauri)
        - Web (browser)
        - CLI
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Junban are you running?
      placeholder: "v1.0.0 or commit abc1234"
    validations:
      required: true

  - type: input
    id: os-platform
    attributes:
      label: OS / Platform
      description: What operating system and platform are you using?
      placeholder: "e.g. macOS 14, Windows 11, Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other context about the problem.
